server.port=8090
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
bank.base-url=http://localhost:8080
logging.level.com.checkout.payment.gateway=DEBUG
# Fast timings for tests ? no real waiting
resilience4j.retry.instances.bankRetry.waitDuration=10ms
resilience4j.circuitbreaker.instances.bankCircuit.waitDurationInOpenState=100ms
resilience4j.circuitbreaker.instances.bankCircuit.slidingWindowSize=10
resilience4j.circuitbreaker.instances.bankCircuit.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.bankCircuit.failureRateThreshold=50

resilience4j.retry.instances.bankRetry.maxAttempts=3

resilience4j.retry.instances.bankRetry.enableExponentialBackoff=true
resilience4j.retry.instances.bankRetry.exponentialBackoffMultiplier=2
# Aspect ordering
resilience4j.retry.retryAspectOrder=1
resilience4j.circuitbreaker.circuitBreakerAspectOrder=2
# Retry only on 503-style exception
resilience4j.retry.instances.bankRetry.retryExceptions=com.checkout.payment.gateway.exception.BankServiceUnavailableException
resilience4j.retry.instances.bankRetry.ignoreExceptions=com.checkout.payment.gateway.exception.BankRequestException
# Circuit breaker records only service failures
resilience4j.circuitbreaker.instances.bankCircuit.recordExceptions=com.checkout.payment.gateway.exception.BankServiceUnavailableException
resilience4j.circuitbreaker.instances.bankCircuit.ignoreExceptions=com.checkout.payment.gateway.exception.BankRequestException